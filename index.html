============================================================ -->
<div id="app"></div>
<script>
  // Đảm bảo có viewport cho iPhone (nếu file chạy độc lập)
  if(!document.querySelector('meta[name=viewport]')){
    const m=document.createElement('meta'); m.name='viewport';
    m.content='width=device-width, initial-scale=1, viewport-fit=cover';
    document.head.appendChild(m);
  }
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body { background: linear-gradient(135deg,#d7e3d2 0%,#e8efe6 40%,#cfdbe0 100%); min-height: 100vh; min-height: 100dvh; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 28px; }
  .glass { background: rgba(255,255,255,.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
           border: 1px solid rgba(255,255,255,.6); box-shadow: 0 8px 32px rgba(60,80,60,.12); }
  .header { border-radius: 28px; padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; gap:12px; }
  .logo { width: 46px; height: 46px; border-radius: 14px; background: #3a4a6b; display: flex; align-items: center; justify-content: center; color:#fff; font-weight:800; font-size:20px; flex-shrink:0; }
  .title { font-size: 22px; font-weight: 800; color: #2a3650; letter-spacing: -.5px; }
  .sub { font-size: 11px; letter-spacing: 2px; color: #7a8a7a; font-weight: 600; }
  .live { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; color: #3a7a4a; display: flex; align-items: center; gap: 6px; flex-shrink:0; }
  .dot { width: 8px; height: 8px; border-radius: 8px; background: #3a7a4a; display: inline-block; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 22px; }
  .card { border-radius: 28px; padding: 24px; }
  .label { font-size: 13px; letter-spacing: 2px; color: #7a8a7a; font-weight: 700; margin-bottom: 14px; }
  .drop { border: 2px dashed rgba(58,74,107,.3); border-radius: 20px; padding: 44px 20px; text-align: center; cursor: pointer; background: rgba(255,255,255,.3); }
  .drop b { color:#2a3650; font-size:16px; } .drop span{ font-size:12px; color:#7a8a7a; }
  video { width: 100%; border-radius: 18px; display: block; background:#000; }
  textarea { width: 100%; min-height: 80px; border-radius: 16px; border: 1px solid rgba(58,74,107,.15); padding: 14px; font-size: 16px; resize: vertical; background: rgba(255,255,255,.6); color: #2a3650; }
  .mini { font-size: 11px; font-weight: 700; color: #7a8a7a; margin: 16px 0 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 9px 14px; border-radius: 16px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: rgba(255,255,255,.6); color: #5a6a5a; }
  .chip.on { background: #3a4a6b; color: #fff; }
  .btn { width: 100%; margin-top: 20px; padding: 16px; border-radius: 18px; border: none; cursor: pointer; background: #3a4a6b; color: #fff; font-size: 16px; font-weight: 700; }
  .btn:active { transform: scale(.985); }
  .btn:disabled { opacity: .6; cursor: default; }
  .err { margin-top: 12px; color: #c0392b; font-size: 13px; text-align: center; }
  .res-block { margin-bottom: 18px; }
  .res-label { font-size: 11px; letter-spacing: 1.5px; color: #7a8a7a; font-weight: 700; margin-bottom: 8px; }
  .item { background: rgba(255,255,255,.6); border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; font-size: 14px; color: #2a3650; line-height: 1.5; display:flex; gap:8px; align-items:flex-start; }
  .item .txt { flex:1; white-space: pre-wrap; }
  .cap { background: rgba(255,255,255,.6); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .cap .style { font-size: 11px; font-weight: 700; color: #3a7a4a; margin-bottom: 6px; }
  .cap .text { font-size: 14px; color: #2a3650; line-height: 1.6; white-space: pre-wrap; }
  .copy { font-size: 13px; font-weight: 700; color: #3a4a6b; background: rgba(58,74,107,.08); border: none; cursor: pointer; margin-top: 8px; padding: 6px 12px; border-radius: 10px; flex-shrink:0; }
  .tag { font-size: 12px; color: #3a4a6b; background: rgba(58,74,107,.1); padding: 5px 11px; border-radius: 12px; }
  .empty { text-align: center; padding: 60px 20px; color: #9aaa9a; font-size: 14px; }
  .right { border-radius: 28px; padding: 24px; min-height: 420px; }
  .status { font-size:12px; color:#7a8a7a; margin-top:8px; word-break:break-all; }

  /* ===== iPhone / màn hình nhỏ ===== */
  @media(max-width:760px){
    .wrap { padding: 14px; }
    .grid { grid-template-columns: 1fr; gap: 14px; }
    .col { gap: 14px; }
    .header { border-radius: 22px; padding: 16px 18px; }
    .title { font-size: 19px; }
    .sub { font-size: 10px; letter-spacing: 1.5px; }
    .card, .right { border-radius: 22px; padding: 18px; }
    .right { min-height: auto; }
    .drop { padding: 32px 14px; }
    .chip { padding: 10px 15px; font-size: 14px; }
    .btn { padding: 16px; font-size: 16px; }
  }
</style>

<script>
// ============================================================
//  ⬇️⬇️⬇️  DÁN URL WORKER CỦA BẠN VÀO ĐÂY  ⬇️⬇️⬇️
const WORKER_URL = "toulousereel.hongphi130894.workers.dev";
// ============================================================

const tones = ["Cảm xúc / Storytelling","Trẻ trung / Hài hước","Sang trọng / Tinh tế","Bán hàng trực tiếp","Truyền cảm hứng"];
const goals = ["Tăng tương tác & comment","Chốt đơn / Bán hàng","Tăng nhận diện thương hiệu","Kêu gọi đặt bánh"];
let state = { tone: tones[0], goal: goals[0], videoFile: null, videoUrl: null, desc: "", loading: false, status:"", result: null, error: "" };

function setS(p){ Object.assign(state,p); render(); }

async function fileToBase64(file){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(file); });
}

async function run(){
  if(!state.videoFile){ setS({error:"Vui lòng tải video lên trước."}); return; }
  if(WORKER_URL.includes("YOUR-WORKER")){ setS({error:"Bạn chưa dán URL Worker vào file (biến WORKER_URL)."}); return; }
  setS({loading:true,error:"",result:null,status:"Đang tải video lên..."});
  try{
    const b64 = await fileToBase64(state.videoFile);
    // 1) upload
    let r = await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"upload",dataBase64:b64,mimeType:state.videoFile.type,sizeBytes:state.videoFile.size})});
    let up = await r.json();
    if(up.error){ throw new Error(up.error+(up.detail?": "+up.detail:"")); }

    // 2) chờ video ACTIVE
    setS({status:"Gemini đang xử lý video..."});
    let info = up;
    let tries = 0;
    while(info.state !== "ACTIVE" && tries < 30){
      await new Promise(s=>setTimeout(s,2000));
      r = await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"status",name:up.name})});
      info = await r.json();
      tries++;
    }
    if(info.state !== "ACTIVE"){ throw new Error("Video xử lý quá lâu, thử video ngắn hơn."); }

    // 3) phân tích
    setS({status:"Chuyên gia AI đang viết content..."});
    r = await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"analyze",fileUri:info.uri,mimeType:info.mimeType,desc:state.desc,tone:state.tone,goal:state.goal})});
    let out = await r.json();
    if(out.error){ throw new Error(out.error); }
    const parsed = safeParse(out.raw);
    if(!parsed){ throw new Error("AI trả dữ liệu chưa đầy đủ, hãy thử lại hoặc dùng video ngắn hơn."); }
    setS({loading:false,status:"",result:parsed});
  }catch(e){
    setS({loading:false,status:"",error:"Lỗi: "+e.message});
  }
}

function copy(t,btn){ navigator.clipboard?.writeText(t); const o=btn.textContent; btn.textContent="✓ Đã chép"; setTimeout(()=>btn.textContent=o,1500); }

// Parse JSON chịu lỗi: nếu Gemini trả thiếu đuôi, cố gắng cứu phần đọc được
function safeParse(raw){
  if(!raw) return null;
  let s = raw.trim().replace(/```json|```/g,"").trim();
  try { return JSON.parse(s); } catch(_){}
  // Cắt tới dấu } cuối cùng rồi đóng ngoặc còn thiếu
  try {
    let lastBrace = s.lastIndexOf("}");
    if(lastBrace > -1){ s = s.slice(0, lastBrace+1); }
    // Đếm ngoặc để bù phần thiếu
    const openCurly=(s.match(/{/g)||[]).length, closeCurly=(s.match(/}/g)||[]).length;
    const openSq=(s.match(/\[/g)||[]).length, closeSq=(s.match(/\]/g)||[]).length;
    s += "]".repeat(Math.max(0,openSq-closeSq));
    s += "}".repeat(Math.max(0,openCurly-closeCurly));
    return JSON.parse(s);
  } catch(_){ return null; }
}

function render(){
  const s = state;
  const resHtml = s.loading
    ? `<div class="empty">⏳ ${s.status||"Đang xử lý..."}</div>`
    : s.result ? renderResult(s.result)
    : `<div class="empty">🎬 Tải video và nhấn phân tích để nhận content do chuyên gia AI viết.</div>`;

  document.getElementById("app").innerHTML = `
  <div class="wrap">
    <div class="glass header">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="logo">🎬</div>
        <div><div class="title">Reel Studio AI</div><div class="sub">TOULOUSE — CONTENT GENERATOR</div></div>
      </div>
      <div class="glass live"><span class="dot"></span> GEMINI</div>
    </div>
    <div class="grid">
      <div class="col">
        <div class="glass card">
          <div class="label">TẢI VIDEO LÊN</div>
          ${s.videoUrl
            ? `<video src="${s.videoUrl}" controls></video><div class="status">${s.videoFile?.name||""}</div>`
            : `<div class="drop" onclick="document.getElementById('f').click()"><div style="font-size:34px">⬆️</div><b>Nhấn để chọn video</b><br><span>MP4, MOV, WebM — nên dưới 20MB</span></div>`}
          <input id="f" type="file" accept="video/*" style="display:none" onchange="onFile(event)">
        </div>
        <div class="glass card">
          <div class="label">MÔ TẢ VIDEO (tuỳ chọn)</div>
          <textarea id="desc" placeholder="VD: Quá trình trang trí bánh kem dâu 2 tầng cho sinh nhật bé gái..." oninput="state.desc=this.value">${s.desc}</textarea>
          <div class="mini">TÔNG GIỌNG</div>
          <div class="chips">${tones.map(t=>`<button class="chip ${s.tone===t?'on':''}" onclick="setS({tone:'${t}'})">${t}</button>`).join("")}</div>
          <div class="mini">MỤC TIÊU</div>
          <div class="chips">${goals.map(g=>`<button class="chip ${s.goal===g?'on':''}" onclick="setS({goal:'${g}'})">${g}</button>`).join("")}</div>
          <button class="btn" ${s.loading?'disabled':''} onclick="run()">${s.loading?'⏳ Đang xử lý...':'✨ Phân tích & Viết content'}</button>
          ${s.error?`<div class="err">${s.error}</div>`:''}
        </div>
      </div>
      <div class="glass right">
        <div class="label">✨ CONTENT REEL ĐỀ XUẤT</div>
        ${resHtml}
      </div>
    </div>
  </div>`;
}

function renderResult(r){
  const esc = (x)=>String(x).replace(/`/g,"'").replace(/'/g,"\\'");
  return `
    <div class="res-block"><div class="res-label">PHÂN TÍCH VIDEO</div><div style="font-size:14px;color:#2a3650;line-height:1.6">${r.analysis||""}</div></div>
    <div class="res-block"><div class="res-label">HOOK MỞ ĐẦU</div>
      ${(r.hooks||[]).map(h=>`<div class="item"><div class="txt">${h}</div><button class="copy" onclick="copy('${esc(h)}',this)">Chép</button></div>`).join("")}</div>
    <div class="res-block"><div class="res-label">CAPTION</div>
      ${(r.captions||[]).map(c=>`<div class="cap"><div class="style">${c.style||""}</div><div class="text">${c.text||""}</div><button class="copy" onclick="copy('${esc(c.text)}',this)">📋 Sao chép</button></div>`).join("")}</div>
    <div class="res-block"><div class="res-label">HASHTAG</div>
      <div class="chips" style="margin-bottom:8px">${(r.hashtags||[]).map(t=>`<span class="tag">${t.startsWith('#')?t:'#'+t}</span>`).join("")}</div>
      <button class="copy" onclick="copy('${esc((r.hashtags||[]).map(t=>t.startsWith('#')?t:'#'+t).join(' '))}',this)">📋 Chép tất cả</button></div>
    <div class="res-block"><div class="res-label">MẸO LÊN XU HƯỚNG</div>
      ${(r.tips||[]).map(t=>`<div style="font-size:13px;color:#2a3650;line-height:1.6;margin-bottom:6px">• ${t}</div>`).join("")}</div>`;
}

function onFile(e){
  const f = e.target.files[0]; if(!f) return;
  state.videoFile = f; state.videoUrl = URL.createObjectURL(f); state.result=null; state.error="";
  render();
}

render();
</script>
