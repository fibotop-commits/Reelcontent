<script>

const WORKER_URL = "https://toulousereel.hongphi130894.workers.dev";

const tones = ["Cảm xúc / Storytelling","Trẻ trung / Hài hước","Sang trọng / Tinh tế","Bán hàng trực tiếp","Truyền cảm hứng"];

const formulas = [
  { id: "AI tự chọn", desc: "Để AI tự cân nhắc và chọn công thức phù hợp nhất với nội dung video.", example: "AI sẽ phân tích video rồi quyết định cách viết hợp nhất." },
  { id: "AIDA", desc: "Attention (gây chú ý) → Interest (khơi gợi quan tâm) → Desire (tạo khao khát) → Action (kêu gọi đặt hàng). Kinh điển, hợp bán hàng trực tiếp.", example: "A: Chiếc bánh khiến cả bữa tiệc ồ lên 😍 → I: Kem tươi Pháp, dâu tươi mỗi sáng → D: Sinh nhật con xứng đáng điều đẹp nhất → A: Inbox đặt bánh ngay hôm nay!" },
  { id: "PAS", desc: "Problem (nêu vấn đề) → Agitate (khoét sâu nỗi lo) → Solution (giải pháp là bạn). Rất mạnh cho reel vì hook đánh thẳng nỗi đau khách.", example: "P: Đặt bánh mà sợ bánh xấu, giao trễ? → A: Sinh nhật chỉ có một lần, hỏng là tiếc cả năm → S: Toulouse handmade, giao đúng giờ, đẹp như hình." },
  { id: "BAB", desc: "Before (hiện tại) → After (viễn cảnh đẹp) → Bridge (cầu nối là sản phẩm). Hợp kể chuyện cảm xúc, chạm tới khoảnh khắc.", example: "B: Tiệc sinh nhật thiếu điểm nhấn → A: Khoảnh khắc thổi nến ai cũng trầm trồ → Bridge: Nhờ chiếc bánh Toulouse đặt riêng." },
  { id: "4U", desc: "Useful (hữu ích) · Urgent (khẩn cấp) · Unique (độc đáo) · Ultra-specific (cực cụ thể). Hợp viết hook ngắn cho 3 giây đầu reel.", example: "Bánh kem dâu tươi 2 tầng, đặt trước 24h, chỉ 30 suất/ngày tại Ô Chợ Dừa 🍓" }
];

const lengths = [
  { id: "Ngắn", hint: "~40-60 từ, súc tích cho reel nhanh" },
  { id: "Vừa", hint: "~80-120 từ, đủ ý và cảm xúc" },
  { id: "Dài", hint: "~150-220 từ, kể chuyện chi tiết" },
  { id: "Tự điền", hint: "Bạn nhập số từ mong muốn" }
];

let state = { mode: "toulouse", tone: tones[0], goal: goals[0], customTone: "", customGoal: "", formula: formulas[0].id, length: lengths[0].id, customWords: "", videoFile: null, videoUrl: null, isImage: false, desc: "", loading: false, status:"", result: null, error: "", uploadedUri: null, uploadedMime: null };

function setS(p){
  const onlyStatus = Object.keys(p).length === 1 && "status" in p && state.loading;
  Object.assign(state,p);
  if(onlyStatus){
    const el = document.getElementById("statusText");
    if(el){ el.textContent = state.status; return; }
  }
  render();
}

function selectChip(field, value){
  const prev = state[field];
  state[field] = value;
  const needsStructuralRender =
    field === "tone"   && (value === "__custom__" || prev === "__custom__") ||
    field === "goal"   && (value === "__custom__" || prev === "__custom__") ||
    field === "length" && (value === "Tự điền"    || prev === "Tự điền")   ||
    field === "formula";

  if(needsStructuralRender){ render(); return; }
  refreshChipGroup(field);
}

function refreshChipGroup(field){
  document.querySelectorAll(`.chip[data-field="${field}"]`).forEach(btn=>{
    btn.classList.toggle("on", btn.getAttribute("data-value") === String(state[field]));
  });
}

function uploadWithProgress(file, onProgress){
  return new Promise((resolve, reject)=>{
    const xhr = new XMLHttpRequest();
    xhr.open("POST", WORKER_URL + "?action=upload");
    xhr.setRequestHeader("Content-Type","application/octet-stream");
    
    // FIX LỖI DI ĐỘNG: Nếu file.type bị rỗng, tự động map theo đuôi file hoặc ép về video/mp4 để tránh lỗi 400
    let detectedMime = file.type;
    if(!detectedMime || detectedMime.trim() === "") {
      detectedMime = file.name.endsWith(".jpg") || file.name.endsWith(".jpeg") ? "image/jpeg" :
                     file.name.endsWith(".png") ? "image/png" : "video/mp4";
    }
    
    xhr.setRequestHeader("X-Mime-Type", detectedMime);
    xhr.setRequestHeader("X-Size-Bytes", String(file.size));
    
    xhr.upload.onprogress = (e)=>{ if(e.lengthComputable) onProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = ()=>{ try{ resolve(JSON.parse(xhr.responseText)); }catch{ reject(new Error("Phản hồi không hợp lệ từ hệ thống")); } };
    xhr.onerror = ()=> reject(new Error("Mất kết nối Internet khi tải dữ liệu"));
    xhr.ontimeout = ()=> reject(new Error("Tải dữ liệu quá lâu, vui lòng chọn file nhẹ hơn"));
    xhr.timeout = 180000;
    xhr.send(file);
  });
}

function errMsg(o, fallback){
  if(!o) return fallback;
  if(o.error && o.detail) return `${o.error}\nChi tiết: ${o.detail}`;
  return o.error || fallback;
}

async function callAnalyze(uri, mime){
  let lengthSpec = state.length;
  if(state.length === "Tự điền"){
    const n = parseInt(state.customWords);
    lengthSpec = (n && n>0) ? `khoảng ${n} từ` : "Vừa";
  }
  const toneSpec = state.tone === "__custom__" ? (state.customTone.trim() || "tự nhiên") : state.tone;
  const goalSpec = state.goal === "__custom__" ? (state.customGoal.trim() || "tăng tương tác") : state.goal;
  
  const r = await fetch(WORKER_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"analyze",fileUri:uri,mimeType:mime,desc:state.desc,tone:toneSpec,goal:goalSpec,formula:state.formula,length:lengthSpec,mode:state.mode})
  });
  
  const out = await r.json();
  if(!r.ok || out.error){ throw new Error(errMsg(out,"Lỗi phân tích cú pháp bài viết")); }
  const parsed = safeParse(out.raw);
  if(!parsed){ throw new Error("AI trả dữ liệu chưa đầy đủ cấu trúc JSON, hãy nhấn 'Viết lại' để thử lại."); }
  return parsed;
}

async function run(){
  if(!state.videoFile){ setS({error:"Vui lòng tải video lên trước."}); return; }
  if(WORKER_URL.includes("YOUR-WORKER")){ setS({error:"Bạn chưa dán URL Worker vào file (biến WORKER_URL)."}); return; }
  if(state.videoFile.size === 0){ setS({error:"File rỗng (0 byte). Hãy chọn file khác."}); return; }

  const MB = state.videoFile.size / (1024*1024);
  if(MB > 80){ setS({error:`Video nặng ${MB.toFixed(0)}MB — quá lớn. Hãy dùng file dưới ~80MB.`}); return; }

  setS({loading:true,error:"",result:null,status:"Đang tải dữ liệu lên... 0%",uploadedUri:null,uploadedMime:null});
  try{
    // 1) Giai đoạn Upload
    const upInfo = await uploadWithProgress(state.videoFile, (pct)=>{
      setS({status:`Đang tải dữ liệu lên... ${pct}%`});
    });
    if(upInfo.error || !upInfo.name){ throw new Error(errMsg(upInfo,"Tải file thất bại")); }

    // 2) FIX LỖI 400 CHÍ MẠNG: Vòng lặp kiểm tra trạng thái ACTIVE thực tế của Google
    let info = upInfo, tries = 0;
    setS({status: state.isImage ? "Google đang xử lý ảnh..." : "Google đang convert cấu trúc Video (Đang chờ xử lý)..."});
    
    while(info.state !== "ACTIVE" && tries < 60){
      await new Promise(s=>setTimeout(s, 2000)); // Nghỉ 2 giây trước khi hỏi tiếp
      const r = await fetch(WORKER_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"status",name:upInfo.name})
      });
      info = await r.json();
      if(info.error){ throw new Error(errMsg(info,"Lỗi kiểm tra trạng thái xử lý")); }
      if(info.state === "FAILED"){ throw new Error("Google từ chối convert file này do lỗi định dạng mã hóa."); }
      tries++;
    }
    
    if(info.state !== "ACTIVE"){ throw new Error("Google xử lý file quá lâu, vui lòng thử lại bằng file ngắn hơn."); }

    state.uploadedUri = info.uri;
    state.uploadedMime = info.mimeType;

    // 3) Giai đoạn AI viết bài viết
    setS({status:"Chuyên gia AI đang phân tích & xuất bản bài viết..."});
    const parsed = await callAnalyze(info.uri, info.mimeType);
    setS({loading:false,status:"",result:parsed});
  }catch(e){
    setS({loading:false,status:"",error: e.message});
  }
}

async function regenerate(){
  if(!state.uploadedUri){ setS({error:"Chưa có file gốc để viết lại."}); return; }
  setS({loading:true,error:"",result:null,status:"AI đang tái cấu trúc bài viết mới..."});
  try{
    const parsed = await callAnalyze(state.uploadedUri, state.uploadedMime);
    setS({loading:false,status:"",result:parsed});
  }catch(e){
    setS({loading:false,status:"",error: e.message});
  }
}

function copy(t,btn){ navigator.clipboard?.writeText(t); const o=btn.textContent; btn.textContent="✓ Đã chép"; setTimeout(()=>btn.textContent=o,1500); }

function safeParse(raw){
  if(!raw) return null;
  let s = raw.trim().replace(/```json|```/g,"").trim();
  try { return JSON.parse(s); } catch(_){}
  try {
    let lastBrace = s.lastIndexOf("}");
    if(lastBrace > -1){ s = s.slice(0, lastBrace+1); }
    const openCurly=(s.match(/{/g)||[]).length, closeCurly=(s.match(/}/g)||[]).length;
    const openSq=(s.match(/\[/g)||[]).length, closeSq=(s.match(/\]/g)||[]).length;
    s += "]".repeat(Math.max(0,openSq-closeSq));
    s += "}".repeat(Math.max(0,openCurly-closeCurly));
    return JSON.parse(s);
  } catch(_){ return null; }
}

  document.getElementById("app").innerHTML = `

      </div>
      <div class="glass live"><span class="dot"></span> GEMINI ONLINE</div>
    </div>

    <div class="glass mode-bar">
      <button class="mode-btn ${s.mode==="toulouse"?"on":""}" onclick="switchMode('toulouse')">🎂 Toulouse — Bán hàng</button>
      <button class="mode-btn ${s.mode==="personal"?"on":""}" onclick="switchMode('personal')">✍️ Cá nhân — Viral FB</button>
    </div>
    <div class="grid">
      <div class="col">
        <div class="glass card">
          <div class="label">TẢI PHƯƠNG TIỆN LÊN</div>
          ${s.videoUrl
            ? (s.isImage
                ? `<img src="${s.videoUrl}" style="width:100%;border-radius:18px;display:block"><div class="status">${s.videoFile?.name||""}</div>`
                : `<video src="${s.videoUrl}" controls></video><div class="status">${s.videoFile?.name||""}</div>`)
            : `<div class="drop" onclick="document.getElementById('f').click()"><div style="font-size:34px">⬆️</div><b>Nhấn để chọn file ảnh / video</b><br><span>Hỗ trợ JPG, PNG, MP4, MOV — Dung lượng nên nhỏ hơn ~50MB</span></div>`}
          <input id="f" type="file" accept="image/*,video/*" style="display:none" onchange="onFile(event)">
        </div>
        <div class="glass card">
          <div class="label">MÔ TẢ NGỮ CẢNH (BẮT BUỘC NẾU LÀ ẢNH)</div>
          <textarea id="desc" placeholder="VD: Quá trình trang trí bánh kem dâu 2 tầng cho sinh nhật bé gái tại tiệm..." oninput="state.desc=this.value">${s.desc}</textarea>
          <div class="mini">TÔNG GIỌNG CHỦ ĐẠO</div>
          <div class="chips">${toneList.map(t=>`<button class="chip ${s.tone===t?'on':''}" data-field="tone" data-value="${t}" onclick="selectChip('tone','${t}')">${t}</button>`).join("")}<button class="chip ${s.tone==='__custom__'?'on':''}" data-field="tone" data-value="__custom__" onclick="selectChip('tone','__custom__')">✏️ Tự điền</button></div>
          ${s.tone==='__custom__'?`<input type="text" placeholder="Nhập tông giọng, vd: Nhẹ nhàng tâm sự..." value="${s.customTone}" oninput="state.customTone=this.value" class="custom-in">`:``}
          ${s.mode==="personal" ? "" : `
          <div class="mini">CÔNG THỨC COPYWRITING</div>
          <div class="chips">${formulas.map(f=>`<button class="chip ${s.formula===f.id?'on':''}" data-field="formula" data-value="${f.id}" onclick="selectChip('formula','${f.id}')">${f.id}</button>`).join("")}</div>
          ${(()=>{ const f=formulas.find(x=>x.id===s.formula); return `<div class="formula-box"><div class="formula-desc">${f.desc}</div><div class="formula-ex"><b>Ví dụ:</b> ${f.example}</div></div>`; })()}`}
          <div class="mini">ĐỘ DÀI VĂN BẢN</div>
          <div class="chips">${lengths.map(l=>`<button class="chip ${s.length===l.id?'on':''}" data-field="length" data-value="${l.id}" onclick="selectChip('length','${l.id}')">${l.id}</button>`).join("")}</div>
          ${s.length==="Tự điền"
            ? `<input id="cw" type="number" min="10" max="1000" placeholder="Nhập số từ mong muốn..." value="${s.customWords}" oninput="state.customWords=this.value" style="width:100%;margin-top:10px;border-radius:14px;border:1px solid rgba(58,74,107,.15);padding:12px 14px;font-size:16px;background:rgba(255,255,255,.6);color:#2a3650">`
            : `<div class="length-hint">${lengths.find(l=>l.id===s.length).hint}</div>`}
          <div class="mini">MỤC TIÊU NỘI DUNG</div>
          <div class="chips">${goalList.map(g=>`<button class="chip ${s.goal===g?'on':''}" data-field="goal" data-value="${g}" onclick="selectChip('goal','${g}')">${g}</button>`).join("")}<button class="chip ${s.goal==='__custom__'?'on':''}" data-field="goal" data-value="__custom__" onclick="selectChip('goal','__custom__')">✏️ Tự điền</button></div>
          ${s.goal==='__custom__'?`<input type="text" placeholder="Nhập mục tiêu cụ thể..." value="${s.customGoal}" oninput="state.customGoal=this.value" class="custom-in">`:``}
          <button class="btn" ${s.loading?'disabled':''} onclick="run()">${s.loading?'⏳ Hệ thống đang chạy...':'✨ Phân tích & Viết content'}</button>
          ${s.error?`<div class="err">${s.error}</div>`:''}
        </div>
      </div>
      <div class="glass right">
        <div class="label" style="display:flex;align-items:center;justify-content:space-between;gap:10px">
          <span>✨ KẾT QUẢ XUẤT BẢN</span>
          ${(s.result && !s.loading) ? `<button class="copy" style="margin-top:0" onclick="regenerate()">🔄 Viết lại bản khác</button>` : ``}
        </div>
        ${resHtml}
      </div>
    </div>
  </div>`;
}

function renderResult(r){
  const esc = (x)=>String(x).replace(/\\/g,"\\\\").replace(/`/g,"'").replace(/'/g,"\\'").replace(/\r?\n/g,"\\n");
  return `
    <div class="res-block"><div class="res-label">PHÂN TÍCH THỊ GIÁC</div><div style="font-size:14px;color:#2a3650;line-height:1.6">${r.analysis||""}</div></div>
    <div class="res-block"><div class="res-label">HOOK THU HÚT NGƯỜI XEM</div>
      ${(r.hooks||[]).map(h=>`<div class="item"><div class="txt">${h}</div><button class="copy" onclick="copy('${esc(h)}',this)">Chép</button></div>`).join("")}</div>
    <div class="res-block"><div class="res-label">NỘI DUNG BÀI VIẾT (CAPTION)</div>
      ${(r.captions||[]).map(c=>`<div class="cap"><div class="style">${c.style||""}</div><div class="text">${c.text||""}</div><button class="copy" onclick="copy('${esc(c.text)}',this)">📋 Sao chép bài viết</button></div>`).join("")}</div>
    <div class="res-block"><div class="res-label">HASHTAGS BÀI VIẾT</div>
      <div class="chips" style="margin-bottom:8px">${(r.hashtags||[]).map(t=>`<span class="tag">${t.startsWith('#')?t:'#'+t}</span>`).join("")}</div>
      <button class="copy" onclick="copy('${esc((r.hashtags||[]).map(t=>t.startsWith('#')?t:'#'+t).join(' '))}',this)">📋 Chép tất cả bộ tag</button></div>
    <div class="res-block"><div class="res-label">MẸO TỐI ƯU TƯƠNG TÁC XU HƯỚNG</div>
      ${(r.tips||[]).map(t=>`<div style="font-size:13px;color:#2a3650;line-height:1.6;margin-bottom:6px">• ${t}</div>`).join("")}</div>`;
}

function onFile(e){
  const f = e.target.files[0]; if(!f) return;
  state.videoFile = f;
  state.isImage = f.type.startsWith("image") || f.name.endsWith(".jpg") || f.name.endsWith(".jpeg") || f.name.endsWith(".png");
  state.videoUrl = URL.createObjectURL(f);
  state.result=null; state.error="";
  render();
}

function switchMode(m){
  const t = m === "personal" ? tonesPersonal[0] : tones[0];
  const g = m === "personal" ? goalsPersonal[0] : goals[0];
  setS({ mode: m, tone: t, goal: g, customTone: "", customGoal: "", videoFile: null, videoUrl: null, isImage: false, result: null, error: "" });
}

render();
</script>
