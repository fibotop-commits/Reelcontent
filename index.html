<div id="app"></div>
<script>
  // ===== Cấu hình để "Thêm vào màn hình chính" thành app (PWA) =====
  (function(){
    const head = document.head;
    const add = (tag, attrs) => { const e=document.createElement(tag); Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v)); head.appendChild(e); return e; };

    if(!document.querySelector('meta[name=viewport]'))
      add('meta',{name:'viewport',content:'width=device-width, initial-scale=1, viewport-fit=cover'});

    // Tên app + thanh trạng thái
    add('meta',{name:'apple-mobile-web-app-capable',content:'yes'});
    add('meta',{name:'mobile-web-app-capable',content:'yes'});
    add('meta',{name:'apple-mobile-web-app-status-bar-style',content:'default'});
    add('meta',{name:'apple-mobile-web-app-title',content:'Reel AI'});
    add('meta',{name:'theme-color',content:'#3a4a6b'});
    document.title = 'Reel Studio AI — Toulouse';

    // Icon app: vẽ bằng SVG (navy gradient, chữ T thương hiệu) -> dùng làm icon màn hình chính
    const iconSVG = `<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'>
      <defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
        <stop offset='0' stop-color='#46577d'/><stop offset='1' stop-color='#2a3650'/></linearGradient></defs>
      <rect width='512' height='512' rx='112' fill='url(#g)'/>
      <circle cx='256' cy='256' r='150' fill='none' stroke='#ffffff' stroke-width='20' opacity='0.95'/>
      <text x='256' y='258' font-family='Georgia, serif' font-size='180' font-weight='700' fill='#ffffff' text-anchor='middle' dominant-baseline='central'>T</text>
      <circle cx='256' cy='400' r='14' fill='#9fb6e0'/>
    </svg>`;
    const iconURL = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(iconSVG)));
    add('link',{rel:'apple-touch-icon',href:iconURL});
    add('link',{rel:'icon',type:'image/svg+xml',href:iconURL});

    // Manifest (cho Android/Chrome hiện nút "Cài đặt ứng dụng")
    const manifest = {
      name:'Reel Studio AI — Toulouse', short_name:'Reel AI',
      start_url:'.', display:'standalone',
      background_color:'#e8efe6', theme_color:'#3a4a6b',
      icons:[{src:iconURL,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]
    };
    const mURL = 'data:application/json;base64,' + btoa(unescape(encodeURIComponent(JSON.stringify(manifest))));
    add('link',{rel:'manifest',href:mURL});
  })();
</script>

<script>
// ============================================================
//  ⬇️⬇️⬇️  DÁN URL WORKER CỦA BẠN VÀO ĐÂY  ⬇️⬇️⬇️
const WORKER_URL = "https://toulousereel.hongphi130894.workers.dev";
// ============================================================

const tones = ["Cảm xúc / Storytelling","Trẻ trung / Hài hước","Sang trọng / Tinh tế","Bán hàng trực tiếp","Truyền cảm hứng"];
const goals = ["Tăng tương tác & comment","Chốt đơn / Bán hàng","Tăng nhận diện thương hiệu","Kêu gọi đặt bánh"];

// Các công thức copywriting + giải thích + ví dụ cụ thể cho bánh sinh nhật Toulouse
const formulas = [
  {
    id: "AI tự chọn",
    desc: "Để AI tự cân nhắc và chọn công thức phù hợp nhất với nội dung video.",
    example: "AI sẽ phân tích video rồi quyết định cách viết hợp nhất."
  },
  {
    id: "AIDA",
    desc: "Attention (gây chú ý) → Interest (khơi gợi quan tâm) → Desire (tạo khao khát) → Action (kêu gọi đặt hàng). Kinh điển, hợp bán hàng trực tiếp.",
    example: "A: Chiếc bánh khiến cả bữa tiệc ồ lên 😍 → I: Kem tươi Pháp, dâu tươi mỗi sáng → D: Sinh nhật con xứng đáng điều đẹp nhất → A: Inbox đặt bánh ngay hôm nay!"
  },
  {
    id: "PAS",
    desc: "Problem (nêu vấn đề) → Agitate (khoét sâu nỗi lo) → Solution (giải pháp là bạn). Rất mạnh cho reel vì hook đánh thẳng nỗi đau khách.",
    example: "P: Đặt bánh mà sợ bánh xấu, giao trễ? → A: Sinh nhật chỉ có một lần, hỏng là tiếc cả năm → S: Toulouse handmade, giao đúng giờ, đẹp như hình."
  },
  {
    id: "BAB",
    desc: "Before (hiện tại) → After (viễn cảnh đẹp) → Bridge (cầu nối là sản phẩm). Hợp kể chuyện cảm xúc, chạm tới khoảnh khắc.",
    example: "B: Tiệc sinh nhật thiếu điểm nhấn → A: Khoảnh khắc thổi nến ai cũng trầm trồ → Bridge: Nhờ chiếc bánh Toulouse đặt riêng."
  },
  {
    id: "4U",
    desc: "Useful (hữu ích) · Urgent (khẩn cấp) · Unique (độc đáo) · Ultra-specific (cực cụ thể). Hợp viết hook ngắn cho 3 giây đầu reel.",
    example: "Bánh kem dâu tươi 2 tầng, đặt trước 24h, chỉ 30 suất/ngày tại Ô Chợ Dừa 🍓"
  }
];

const lengths = [
  { id: "Ngắn", hint: "~40-60 từ, súc tích cho reel nhanh" },
  { id: "Vừa", hint: "~80-120 từ, đủ ý và cảm xúc" },
  { id: "Dài", hint: "~150-220 từ, kể chuyện chi tiết" },
  { id: "Tự điền", hint: "Bạn nhập số từ mong muốn" }
];

let state = { tone: tones[0], goal: goals[0], formula: formulas[0].id, length: lengths[0].id, customWords: "", videoFile: null, videoUrl: null, desc: "", loading: false, status:"", result: null, error: "" };

function setS(p){
  // Tối ưu mượt: nếu chỉ đổi mỗi status lúc đang tải, cập nhật riêng chữ đó
  // thay vì vẽ lại toàn bộ trang (tránh giật + mất focus trên iPhone).
  const onlyStatus = Object.keys(p).length === 1 && "status" in p && state.loading;
  Object.assign(state,p);
  if(onlyStatus){
    const el = document.getElementById("statusText");
    if(el){ el.textContent = state.status; return; }
  }
  render();
}

// Upload binary tới Worker, có theo dõi % tiến trình (XHR hỗ trợ, fetch thì không)
function uploadWithProgress(file, onProgress){
  return new Promise((resolve, reject)=>{
    const xhr = new XMLHttpRequest();
    xhr.open("POST", WORKER_URL + "?action=upload");
    xhr.setRequestHeader("Content-Type","application/octet-stream");
    xhr.setRequestHeader("X-Mime-Type", file.type || "video/mp4");
    xhr.setRequestHeader("X-Size-Bytes", String(file.size));
    xhr.upload.onprogress = (e)=>{ if(e.lengthComputable) onProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = ()=>{ try{ resolve(JSON.parse(xhr.responseText)); }catch{ reject(new Error("Phản hồi không hợp lệ")); } };
    xhr.onerror = ()=> reject(new Error("Mất kết nối khi tải video"));
    xhr.ontimeout = ()=> reject(new Error("Tải video quá lâu, thử video nhẹ hơn"));
    xhr.timeout = 180000; // 3 phút
    xhr.send(file);
  });
}

async function run(){
  if(!state.videoFile){ setS({error:"Vui lòng tải video lên trước."}); return; }
  if(WORKER_URL.includes("YOUR-WORKER")){ setS({error:"Bạn chưa dán URL Worker vào file (biến WORKER_URL)."}); return; }

  // Cảnh báo sớm nếu video quá nặng (chặn trước khi tải, đỡ chờ vô ích)
  const MB = state.videoFile.size / (1024*1024);
  if(MB > 80){ setS({error:`Video nặng ${MB.toFixed(0)}MB — quá lớn. Hãy dùng video reel ngắn dưới ~80MB.`}); return; }

  setS({loading:true,error:"",result:null,status:"Đang tải video lên... 0%"});
  try{
    // 1) Upload video (có %)
    const upInfo = await uploadWithProgress(state.videoFile, (pct)=>{
      setS({status:`Đang tải video lên... ${pct}%`});
    });
    if(upInfo.error || !upInfo.name){ throw new Error(upInfo.error||"Upload video thất bại"); }

    // 2) Chờ Gemini xử lý — polling thông minh: nhanh lúc đầu, giãn dần
    setS({status:"Gemini đang xử lý video..."});
    let info = upInfo, tries = 0;
    const delays = [1000,1500,2000,2500,3000];
    while(info.state !== "ACTIVE" && tries < 40){
      await new Promise(s=>setTimeout(s, delays[Math.min(tries,delays.length-1)]));
      const r = await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"status",name:upInfo.name})});
      info = await r.json();
      tries++;
    }
    if(info.state !== "ACTIVE"){ throw new Error("Video xử lý quá lâu, thử video ngắn hơn."); }

    // 3) Phân tích & viết content
    setS({status:"Chuyên gia AI đang viết content..."});
    let lengthSpec = state.length;
    if(state.length === "Tự điền"){
      const n = parseInt(state.customWords);
      lengthSpec = (n && n>0) ? `khoảng ${n} từ` : "Vừa";
    }
    const r = await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"analyze",fileUri:info.uri,mimeType:info.mimeType,desc:state.desc,tone:state.tone,goal:state.goal,formula:state.formula,length:lengthSpec})});
    const out = await r.json();
    if(out.error){ throw new Error(out.error); }
    const parsed = safeParse(out.raw);
    if(!parsed){ throw new Error("AI trả dữ liệu chưa đầy đủ, hãy thử lại hoặc dùng video ngắn hơn."); }
    setS({loading:false,status:"",result:parsed});
  }catch(e){
    setS({loading:false,status:"",error:"Lỗi: "+e.message});
  }
}

function copy(t,btn){ navigator.clipboard?.writeText(t); const o=btn.textContent; btn.textContent="✓ Đã chép"; setTimeout(()=>btn.textContent=o,1500); }

// Parse JSON chịu lỗi: nếu Gemini trả thiếu đuôi, cố gắng cứu phần đọc được
function safeParse(raw){
  if(!raw) return null;
  let s = raw.trim().replace(/```json|```/g,"").trim();
  try { return JSON.parse(s); } catch(_){}
  // Cắt tới dấu } cuối cùng rồi đóng ngoặc còn thiếu
  try {
    let lastBrace = s.lastIndexOf("}");
    if(lastBrace > -1){ s = s.slice(0, lastBrace+1); }
    // Đếm ngoặc để bù phần thiếu
    const openCurly=(s.match(/{/g)||[]).length, closeCurly=(s.match(/}/g)||[]).length;
    const openSq=(s.match(/\[/g)||[]).length, closeSq=(s.match(/\]/g)||[]).length;
    s += "]".repeat(Math.max(0,openSq-closeSq));
    s += "}".repeat(Math.max(0,openCurly-closeCurly));
    return JSON.parse(s);
  } catch(_){ return null; }
}

function render(){
  const s = state;
  const resHtml = s.loading
    ? `<div class="empty"><div class="spinner"></div><div id="statusText" style="margin-top:14px">${s.status||"Đang xử lý..."}</div></div>`
    : s.result ? renderResult(s.result)
    : `<div class="empty">🎬 Tải video và nhấn phân tích để nhận content do chuyên gia AI viết.</div>`;

  document.getElementById("app").innerHTML = `
  <div class="wrap">
    <div class="glass header">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="logo">🎬</div>
        <div><div class="title">Reel Studio AI</div><div class="sub">TOULOUSE — CONTENT GENERATOR</div></div>
      </div>
      <div class="glass live"><span class="dot"></span> GEMINI</div>
    </div>
    <div class="grid">
      <div class="col">
        <div class="glass card">
          <div class="label">TẢI VIDEO LÊN</div>
          ${s.videoUrl
            ? `<video src="${s.videoUrl}" controls></video><div class="status">${s.videoFile?.name||""}</div>`
            : `<div class="drop" onclick="document.getElementById('f').click()"><div style="font-size:34px">⬆️</div><b>Nhấn để chọn video</b><br><span>MP4, MOV, WebM — nên dưới 20MB</span></div>`}
          <input id="f" type="file" accept="video/*" style="display:none" onchange="onFile(event)">
        </div>
        <div class="glass card">
          <div class="label">MÔ TẢ VIDEO (tuỳ chọn)</div>
          <textarea id="desc" placeholder="VD: Quá trình trang trí bánh kem dâu 2 tầng cho sinh nhật bé gái..." oninput="state.desc=this.value">${s.desc}</textarea>
          <div class="mini">TÔNG GIỌNG</div>
          <div class="chips">${tones.map(t=>`<button class="chip ${s.tone===t?'on':''}" onclick="setS({tone:'${t}'})">${t}</button>`).join("")}</div>
          <div class="mini">CÔNG THỨC VIẾT</div>
          <div class="chips">${formulas.map(f=>`<button class="chip ${s.formula===f.id?'on':''}" onclick="setS({formula:'${f.id}'})">${f.id}</button>`).join("")}</div>
          ${(()=>{ const f=formulas.find(x=>x.id===s.formula); return `<div class="formula-box"><div class="formula-desc">${f.desc}</div><div class="formula-ex"><b>Ví dụ:</b> ${f.example}</div></div>`; })()}
          <div class="mini">ĐỘ DÀI CONTENT</div>
          <div class="chips">${lengths.map(l=>`<button class="chip ${s.length===l.id?'on':''}" onclick="setS({length:'${l.id}'})">${l.id}</button>`).join("")}</div>
          ${s.length==="Tự điền"
            ? `<input id="cw" type="number" min="10" max="1000" placeholder="Nhập số từ, vd: 100" value="${s.customWords}" oninput="state.customWords=this.value" style="width:100%;margin-top:10px;border-radius:14px;border:1px solid rgba(58,74,107,.15);padding:12px 14px;font-size:16px;background:rgba(255,255,255,.6);color:#2a3650">`
            : `<div class="length-hint">${lengths.find(l=>l.id===s.length).hint}</div>`}
          <div class="mini">MỤC TIÊU</div>
          <div class="chips">${goals.map(g=>`<button class="chip ${s.goal===g?'on':''}" onclick="setS({goal:'${g}'})">${g}</button>`).join("")}</div>
          <button class="btn" ${s.loading?'disabled':''} onclick="run()">${s.loading?'⏳ Đang xử lý...':'✨ Phân tích & Viết content'}</button>
          ${s.error?`<div class="err">${s.error}</div>`:''}
        </div>
      </div>
      <div class="glass right">
        <div class="label">✨ CONTENT REEL ĐỀ XUẤT</div>
        ${resHtml}
      </div>
    </div>
  </div>`;
}

function renderResult(r){
  const esc = (x)=>String(x).replace(/`/g,"'").replace(/'/g,"\\'");
  return `
    <div class="res-block"><div class="res-label">PHÂN TÍCH VIDEO</div><div style="font-size:14px;color:#2a3650;line-height:1.6">${r.analysis||""}</div></div>
    <div class="res-block"><div class="res-label">HOOK MỞ ĐẦU</div>
      ${(r.hooks||[]).map(h=>`<div class="item"><div class="txt">${h}</div><button class="copy" onclick="copy('${esc(h)}',this)">Chép</button></div>`).join("")}</div>
    <div class="res-block"><div class="res-label">CAPTION</div>
      ${(r.captions||[]).map(c=>`<div class="cap"><div class="style">${c.style||""}</div><div class="text">${c.text||""}</div><button class="copy" onclick="copy('${esc(c.text)}',this)">📋 Sao chép</button></div>`).join("")}</div>
    <div class="res-block"><div class="res-label">HASHTAG</div>
      <div class="chips" style="margin-bottom:8px">${(r.hashtags||[]).map(t=>`<span class="tag">${t.startsWith('#')?t:'#'+t}</span>`).join("")}</div>
      <button class="copy" onclick="copy('${esc((r.hashtags||[]).map(t=>t.startsWith('#')?t:'#'+t).join(' '))}',this)">📋 Chép tất cả</button></div>
    <div class="res-block"><div class="res-label">MẸO LÊN XU HƯỚNG</div>
      ${(r.tips||[]).map(t=>`<div style="font-size:13px;color:#2a3650;line-height:1.6;margin-bottom:6px">• ${t}</div>`).join("")}</div>`;
}

function onFile(e){
  const f = e.target.files[0]; if(!f) return;
  state.videoFile = f; state.videoUrl = URL.createObjectURL(f); state.result=null; state.error="";
  render();
}

render();
</script>
